<!DOCTYPE html>
<html>
<head>
<title>Manam Crafts</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#fff6ec,#fde6d2);
}

header {
  position:fixed;
  width:100%;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.6);
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
}

nav a {
  margin-left:20px;
  cursor:pointer;
}

section {
  min-height:100vh;
  padding:120px 60px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  padding:10px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

button {
  width:100%;
  padding:10px;
  background:#ff7a00;
  color:white;
  border:none;
  cursor:pointer;
}

input {
  width:100%;
  padding:10px;
  margin:10px 0;
}
</style>
</head>

<body>

<header>
  <div><b>Manam Crafts</b></div>
  <nav>
    <a onclick="go('home')">Home</a>
    <a onclick="go('products')">Products</a>
    <a onclick="go('order')">Order</a>
    <a onclick="go('track')">Track</a>
  </nav>
</header>

<section id="home">
  <h1>Crafted with Love ❤️</h1>
</section>

<section id="products">
  <h2>Products</h2>
  <div id="products-container" class="grid"></div>
</section>

<section id="order">
  <h2>Place Order</h2>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="product" placeholder="Product">
  <input id="qty" placeholder="Quantity" oninput="calc()">
  <input id="price" placeholder="Price">
  <input id="total" placeholder="Total">
  <button onclick="placeOrder()">Submit</button>
</section>

<section id="track">
  <h2>Track Order</h2>
  <input id="trackId" placeholder="Enter Order ID">
  <button onclick="trackOrder()">Track</button>
  <div id="trackResult"></div>
</section>

<script>

// ✅ YOUR NEW APPS SCRIPT URL (UPDATED)
const BASE_URL = "https://script.google.com/macros/s/AKfycbyVIDsjzGYpWSo9Vpp5W1hEqp3PzOnwYXqtldQwxu04YI8TlBVeEqpRUM8hpU4-SIEE/exec";

// NAVIGATION
function go(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// LOAD PRODUCTS (JSONP)
function loadProducts(){
  const script = document.createElement("script");
  script.src = BASE_URL + "?action=products&callback=renderProducts";
  document.body.appendChild(script);
}

function renderProducts(data){
  let html = "";

  if(!data || data.status !== "success"){
    document.getElementById("products-container").innerHTML = "<p>No products found</p>";
    return;
  }

  data.products.forEach(p=>{
    html += `
    <div class="card">
      <img src="${p.image || 'https://via.placeholder.com/300'}"
           onerror="this.src='https://via.placeholder.com/300'">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button onclick="select('${p.name}',${p.price})">Order</button>
    </div>`;
  });

  document.getElementById("products-container").innerHTML = html;
}

// SELECT PRODUCT
function select(name, price){
  go('order');
  document.getElementById("product").value = name;
  document.getElementById("price").value = price;
}

// CALCULATE TOTAL
function calc(){
  const q = document.getElementById("qty").value || 0;
  const p = document.getElementById("price").value || 0;
  document.getElementById("total").value = q * p;
}

// PLACE ORDER
function placeOrder(){
  const form = new URLSearchParams();

  form.append("name", name.value);
  form.append("phone", phone.value);
  form.append("product", product.value);
  form.append("qty", qty.value);
  form.append("price", price.value);
  form.append("total", total.value);

  fetch(BASE_URL,{method:"POST",body:form})
  .then(r=>r.json())
  .then(d=>{
    const msg = `🛍️ New Order!
ID: ${d.orderId}
Name: ${name.value}
Phone: ${phone.value}
Product: ${product.value}
Qty: ${qty.value}
Total: ₹${total.value}`;

    
    // WhatsApp alert to YOU
    "https://wa.me/919894122166?text=" + encodeURIComponent(msg)

    alert("Order Placed! ID: "+d.orderId);
  });
}

// TRACK ORDER
function trackOrder(){
  const script = document.createElement("script");
  script.src = BASE_URL + "?action=track&orderId=" + trackId.value + "&callback=showTrack";
  document.body.appendChild(script);
}

function showTrack(data){
  trackResult.innerHTML = data.status==="success"
  ? "Status: "+data.orderStatus
  : "Order not found";
}

// INIT
loadProducts();

</script>

</body>
</html>
