<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manam Crafts</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#fff6ec,#fde6d2);
  color:#333;
  scroll-behavior:smooth;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  z-index:1000;
}

nav a{
  margin-left:20px;
  cursor:pointer;
  font-weight:500;
}

/* SECTION */
section{
  min-height:100vh;
  padding:120px 60px;
}

/* HERO */
.hero{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.hero-inner{
  max-width:700px;
  animation:fadeUp 1s ease;
}

.logo{
  width:150px;
  margin-bottom:20px;
  filter:drop-shadow(0 10px 25px rgba(0,0,0,0.15));
}

.hero h1{
  font-size:54px;
  line-height:1.2;
}

.highlight{
  color:#ff7a00;
}

.hero p{
  margin-top:15px;
  font-size:18px;
  opacity:0.7;
}

.hero-buttons button{
  margin:12px;
  padding:14px 24px;
  border:none;
  border-radius:12px;
  background:#ff7a00;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.hero-buttons button:hover{
  transform:translateY(-3px);
}

.outline{
  background:transparent;
  border:1px solid #ff7a00;
  color:#ff7a00;
}

/* CATEGORY */
.categories{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.cat-card{
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  text-align:center;
  font-size:20px;
  transition:0.3s;
}

.cat-card:hover{
  transform:translateY(-6px);
}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(12px);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-body{
  padding:15px;
}

.price{
  color:#ff7a00;
  font-weight:bold;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:#ff7a00;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

/* FORM */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<header>
  <b>Manam Crafts</b>
  <nav>
    <a onclick="go('home')">Home</a>
    <a onclick="go('categories')">Categories</a>
    <a onclick="go('products')">Products</a>
    <a onclick="go('order')">Order</a>
    <a onclick="go('track')">Track</a>
  </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
  <div class="hero-inner">
    <img src="logo.png" class="logo">
    <h1>Crafted with <span class="highlight">love</span></h1>
    <p>Handmade crochet & pipe cleaner creations</p>
    <div class="hero-buttons">
      <button onclick="go('products')">Explore Products</button>
      <button class="outline" onclick="go('order')">Order Now</button>
    </div>
  </div>
</section>

<!-- CATEGORY -->
<section id="categories">
  <h2>Our Creations</h2>
  <div class="categories">
    <div class="cat-card">🧶 Crochet</div>
    <div class="cat-card">🌸 Pipe Cleaner</div>
    <div class="cat-card">🎁 Custom Gifts</div>
  </div>
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Products</h2>
  <div id="products-container" class="grid"></div>
</section>

<!-- ORDER -->
<section id="order">
  <h2>Place Order</h2>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="product" placeholder="Product">
  <input id="qty" placeholder="Quantity" oninput="calc()">
  <input id="price" placeholder="Price">
  <input id="total" placeholder="Total">
  <button onclick="placeOrder()">Submit</button>
</section>

<!-- TRACK -->
<section id="track">
  <h2>Track Order</h2>
  <input id="trackId" placeholder="Enter Order ID">
  <button onclick="trackOrder()">Track</button>
  <div id="trackResult"></div>
</section>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbyVIDsjzGYpWSo9Vpp5W1hEqp3PzOnwYXqtldQwxu04YI8TlBVeEqpRUM8hpU4-SIEE/exec";

// NAV
function go(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// PRODUCTS
function loadProducts(){
  const script=document.createElement("script");
  script.src=BASE_URL+"?action=products&callback=renderProducts";
  document.body.appendChild(script);
}

function renderProducts(data){
  let html="";
  data.products.forEach(p=>{
    html+=`
    <div class="card">
      <img src="${p.image || 'https://via.placeholder.com/300'}">
      <div class="card-body">
        <h4>${p.name}</h4>
        <div class="price">₹${p.price}</div>
        <button onclick="select('${p.name}',${p.price})">Order</button>
      </div>
    </div>`;
  });
  document.getElementById("products-container").innerHTML=html;
}

// SELECT
function select(n,p){
  go('order');
  product.value=n;
  price.value=p;
}

// CALC
function calc(){
  total.value=qty.value*price.value;
}

// ORDER
function placeOrder(){
  const form=new URLSearchParams();
  form.append("name",name.value);
  form.append("phone",phone.value);
  form.append("product",product.value);
  form.append("qty",qty.value);
  form.append("price",price.value);
  form.append("total",total.value);

  fetch(BASE_URL,{method:"POST",body:form})
  .then(r=>r.json())
  .then(d=>{
    const msg=`🛍️ New Order!
ID:${d.orderId}
Product:${product.value}
Qty:${qty.value}
Total:₹${total.value}`;

    window.open("https://wa.me/919894122166?text="+encodeURIComponent(msg));
    alert("Order Placed! ID: "+d.orderId);
  });
}

// TRACK
function trackOrder(){
  const script=document.createElement("script");
  script.src=BASE_URL+"?action=track&orderId="+trackId.value+"&callback=showTrack";
  document.body.appendChild(script);
}

function showTrack(d){
  trackResult.innerHTML = d.status==="success"
  ? "Status: "+d.orderStatus
  : "Order not found";
}

loadProducts();

</script>

</body>
</html>
